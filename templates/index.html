<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <title>内网文件远程打印系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #f7f8fa;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .main-box {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 32px 32px 16px 32px;
        }
        .title {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .divider {
            border-bottom: 3px solid #3b5998;
            margin-bottom: 24px;
        }
        .user-ip {
            position: absolute;
            top: 18px;
            right: 40px;
            color: #888;
            font-size: 0.95rem;
        }
        .form-section {
            background: #f9fafb;
            border-radius: 6px;
            padding: 18px 20px 10px 20px;
            margin-bottom: 18px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-label {
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
        }
        .required {
            color: #e74c3c;
            font-size: 0.95em;
        }
        .form-row {
            display: flex;
            gap: 16px;
        }
        .form-row > .form-group {
            flex: 1;
        }
        input[type="file"] {
            width: 100%;
        }
        input, select {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #d0d7de;
            border-radius: 4px;
            font-size: 1rem;
            background: #fff;
        }
        button {
            width: 48%;
            padding: 12px 0;
            font-size: 1.1rem;
            border: none;
            border-radius: 4px;
            background: #8ca6db;
            color: #fff;
            font-weight: 600;
            margin-top: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button.secondary {
            background: #bfc9d9;
            color: #333;
        }
        button:active {
            background: #6b8fcf;
        }
        .msg {
            color: #27ae60;
            margin-top: 18px;
            text-align: center;
        }
        .history-box {
            margin-top: 32px;
            background: #f9fafb;
            border-radius: 6px;
            padding: 16px 20px;
        }
        .history-title {
            font-weight: 600;
            margin-bottom: 10px;
        }
        .history-list {
            min-height: 40px;
            color: #aaa;
            font-size: 0.98rem;
        }
        @media (max-width: 700px) {
            .main-box { padding: 12px 2vw 8px 2vw; }
            .user-ip { right: 10px; }
        }
    </style>
</head>
<body>
    <div class="user-ip">当前用户：<span id="user-ip">{{ user_ip }}</span></div>
    <div class="main-box">
        <div class="title">内网文件远程打印系统（作者：忆痕）</div>
        <div class="divider"></div>
        <form method="post" action="/print" enctype="multipart/form-data" id="printForm">
            <div class="form-section">
                <div class="form-group">
                    <label class="form-label">选择文件 <span class="required">(必填)</span></label>
                    <input type="file" name="file" required>
                    <div style="color:#888;font-size:0.95em;margin-top:2px;">支持最大100MB</div>
                </div>
                <div class="form-group">
                    <label class="form-label">选择目标打印机</label>
                    <select name="printer">
                        <option value="">请选择打印机</option>
                        {% if printers %}
                            {% for p in printers %}
                                <option value="{{ p }}">{{ p }}</option>
                            {% endfor %}
                        {% else %}
                            <option value="">未检测到打印机</option>
                        {% endif %}
                    </select>
                </div>
            </div>
            <div class="form-section">
                <div class="form-row">
                <div class="form-group">
                    <label class="form-label">纸张类型</label>
                    <select name="paper_size">
                        <option value="A4" selected>A4（默认）</option>
                        <option value="A3">A3</option>
                        <option value="A5">A5</option>
                        <option value="A6">A6</option>
                        <option value="B5">B5</option>
                        <option value="B6">B6</option>
                        <option value="16K">16K</option>
                        <option value="Postcard">明信片</option>
                        <option value="Envelope">信封</option>
                        <option value="Letter">Letter</option>
                        <option value="Legal">Legal</option>
                        <option value="Executive">Executive</option>
                    </select>
                </div>
                    <div class="form-group">
                        <label class="form-label">打印份数</label>
                        <input type="number" name="copies" min="1" max="100" value="1" required>
                        <div style="color:#888;font-size:0.95em;">范围：1-100份</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">打印页面范围</label>
                        <select name="page_range">
                            <option value="all">全部页面</option>
                            <option value="custom">自定义范围</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">页面缩放比例</label>
                        <select name="scale">
                            <option value="auto">自动缩小适配</option>
                            <option value="100">100%</option>
                            <option value="fit">适合纸张</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">打印颜色模式</label>
                        <select name="color">
                            <option value="color">彩色打印</option>
                            <option value="bw">黑白打印</option>
                        </select>
                    </div>
                </div>
            </div>
            <div style="display:flex;gap:4%;">
                <button type="submit">提交打印任务</button>
                <button type="button" class="secondary" onclick="uploadOnly()">仅上传文件（稍后打印）</button>
            </div>
            <div class="msg" id="msg"></div>
        </form>
        <div class="history-box">
            <div class="history-title">已上传文件历史 <span style="font-weight:400;font-size:0.95em;">（点击文件可选择再用）</span></div>
            <div class="history-list" id="history-list">暂无上传文件历史记录</div>
        </div>
    </div>
    <script>
    // 仅上传文件按钮
    function uploadOnly() {
        document.getElementById('printForm').action = '/upload';
        document.getElementById('printForm').submit();
        setTimeout(()=>{document.getElementById('printForm').action = '/print';}, 500);
    }
    // 可选：显示提交成功消息
    if (window.location.search.includes('success')) {
        document.getElementById('msg').innerText = '文件已提交打印！';
    }
    </script>
</body>
</html>
